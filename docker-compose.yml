version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: model_arena
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api_gateway:
    build:
      context: ./services/api_gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - MODEL_REGISTRY_URL=http://model_registry:8001
      - ARENA_SERVICE_URL=http://arena_service:8002
      - TOURNAMENT_SERVICE_URL=http://tournament_service:8003
      - MONITORING_SERVICE_URL=http://monitoring_service:8004
      - TEAM_SERVICE_URL=http://team_service:8005
    depends_on:
      - model_registry
      - arena_service
      - tournament_service
      - monitoring_service
      - team_service

  model_registry:
    build:
      context: ./services/model_registry
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/model_arena
      - REDIS_URL=redis://redis:6379
      - HF_HOME=/app/hf_cache
    volumes:
      - hf_cache:/app/hf_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  arena_service:
    build:
      context: ./services/arena_service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/model_arena
      - MODEL_REGISTRY_URL=http://model_registry:8001
    depends_on:
      postgres:
        condition: service_healthy

  tournament_service:
    build:
      context: ./services/tournament_service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/model_arena
      - ARENA_SERVICE_URL=http://arena_service:8002
      - MONITORING_SERVICE_URL=http://monitoring_service:8004
    depends_on:
      postgres:
        condition: service_healthy

  monitoring_service:
    build:
      context: ./services/monitoring_service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/model_arena
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  team_service:
    build:
      context: ./services/team_service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/model_arena
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  hf_cache:
