version: '3.8'

services:
  # Garden Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: garden-backend
    ports:
      - "8000:8000"
    volumes:
      - ./garden_data:/app/garden_data
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - garden-network

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: garden-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - garden-network

  # MLflow UI — optional, for viewing training experiment data
  # Run with: docker compose -f docker-compose.garden.yml --profile mlflow up
  mlflow:
    image: python:3.10-slim
    container_name: garden-mlflow
    profiles:
      - mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      sh -c "pip install mlflow>=2.9.0 && 
             mlflow ui --backend-store-uri /mlruns --host 0.0.0.0 --port 5000"
    networks:
      - garden-network

networks:
  garden-network:
    driver: bridge

volumes:
  garden_data:
